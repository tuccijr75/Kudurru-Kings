<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kudurru Kings - Card Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Kudurru Kings</h1>
        </header>

        <div class="game-board">
            <div class="player-area player-1">
                <h2>Player 1</h2>
                <div class="hand" id="player1-hand"></div>
            </div>

            <div class="central-area">
                <div class="court-area">
                    <h3>Court Area</h3>
                    <div class="court-cards" id="court-cards"></div>
                </div>
            </div>

            <div class="player-area player-2">
                <h2>Player 2</h2>
                <div class="hand" id="player2-hand"></div>
            </div>
        </div>

        <div class="controls">
            <button id="draw-card">Draw Card</button>
            <button id="end-turn">End Turn</button>
        </div>

        <footer class="game-footer">
            <p>© 2023 Kudurru Kings - Card Game</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
